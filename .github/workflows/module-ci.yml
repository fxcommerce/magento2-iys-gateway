name: Magento Module CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: PHP syntax
        run: find . -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: XML syntax
        run: python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          files = list(Path('.').rglob('*.xml'))
          for path in files:
              ET.parse(path)
          print(f'Validated {len(files)} XML files')
          PY
